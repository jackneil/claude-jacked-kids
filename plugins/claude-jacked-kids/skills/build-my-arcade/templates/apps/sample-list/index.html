<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My List</title>
  <link rel="stylesheet" href="../../assets/style.css">
  <!-- order: branding -> theme (paints this page in the kid's colors) -> data
       box (AppStore) -> this app's metadata -> the app.
       Plain scripts so the app works offline straight from a file. -->
  <script src="../../arcade.config.js"></script>
  <script src="../../assets/theme.js"></script>
  <script src="../../assets/store.js"></script>
  <script src="metadata.js"></script>
  <style>
    .app-wrap { max-width: 560px; margin: 0 auto; padding: 1rem; }
    .app-top { display: flex; justify-content: space-between; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .app-title { font-size: 1.6rem; font-weight: 800; margin: 0; }
    .add-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .add-row input {
      flex: 1; font-size: 1.1rem; padding: .7rem .9rem; border-radius: 14px;
      /* a visible resting border so it's obvious where to type */
      border: 2px solid rgba(255,255,255,.18); background: var(--card); color: var(--text);
    }
    .add-row input:focus { outline: none; border-color: var(--accent); }
    .add-row button {
      font-size: 1.1rem; font-weight: 800; padding: .7rem 1.1rem; border: none;
      border-radius: 14px; background: var(--accent); color: #fff; cursor: pointer;
      min-height: 48px;
    }
    .add-row button:hover { transform: translateY(-2px); }
    .add-row button:active { transform: translateY(1px) scale(.97); }
    ul.items { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .55rem; }
    li.item {
      display: flex; align-items: center; gap: .4rem; background: var(--card);
      border-radius: 14px; padding: .35rem .5rem; box-shadow: 0 3px 10px rgba(0,0,0,.2);
    }
    /* big, finger-friendly tap targets (~48px) for little hands on a tablet */
    li.item .check {
      font-size: 1.5rem; cursor: pointer; user-select: none; line-height: 1;
      min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
    }
    li.item .check:hover { background: rgba(255,255,255,.08); }
    li.item .check:active { transform: scale(.9); }
    li.item .label { flex: 1; font-size: 1.1rem; word-break: break-word; padding: 0 .2rem; }
    li.item.done .label { opacity: .5; text-decoration: line-through; }
    li.item .del {
      background: none; border: none; color: var(--text); opacity: .55; font-size: 1.4rem; cursor: pointer;
      min-width: 48px; min-height: 48px; border-radius: 12px;
    }
    li.item .del:hover { opacity: 1; background: rgba(255,255,255,.08); }
    li.item .del:active { transform: scale(.9); }
    .empty-note { opacity: .7; text-align: center; margin-top: 2rem; font-size: 1.05rem; }
    .save-note { min-height: 1.2rem; font-size: .9rem; opacity: .75; margin-top: 1rem; text-align: center; }
    /* the save-failure note is the most important message — make it loud */
    .save-note.warn {
      opacity: 1; font-size: 1rem; font-weight: 700; color: #5a3a00;
      background: #ffd27f; border: 2px solid #e0a000; border-radius: 12px;
      padding: .6rem .8rem; max-width: 460px; margin-left: auto; margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="app-wrap">
    <div class="app-top">
      <a class="back-link" href="../../index.html">⬅️ Home</a>
      <h1 class="app-title"><span id="appEmoji">📝</span> <span id="appName">My List</span></h1>
    </div>

    <div class="add-row">
      <input id="newItem" type="text" placeholder="Type something and tap Add…" autocomplete="off" maxlength="120">
      <button id="addBtn" type="button">➕ Add</button>
    </div>

    <ul class="items" id="items"></ul>
    <p class="empty-note" id="emptyNote">Nothing here yet — type something above! ✨</p>
    <p class="save-note" id="saveNote"></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
